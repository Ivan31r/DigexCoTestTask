syntax = "proto3";

option java_outer_classname = "NumberGenerator";
option java_package = "ru.digexco";
//option java_multiple_files = true;


service NumberGeneratorService {
  rpc getNumber(NumberRequest) returns (stream NumberResponse) {};
}

message NumberRequest {
  int64 firstValue = 1;
  int64 lastValue = 2;
}

message NumberResponse {
  int64 number = 1;
}